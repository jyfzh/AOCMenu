name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Name: AOCMonitor.slnx
      RID: win-x64
      UI_PROJECT: src/AOC.UI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Add MSBuild to PATH: https://github.com/microsoft/setup-msbuild
      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v1

      # ── Step 1: Resolve TFMs & Platform from project files ──────
      # Reads TargetFramework and Platform from each csproj so build
      # and pack paths stay in sync with MSBuild output layout.
      - name: Resolve TFMs and Platform
        shell: pwsh
        run: |
          $uiCsproj = Get-Content src/AOC.UI/AOC.UI.csproj -Raw
          $uiTfm = [regex]::Match($uiCsproj, '<TargetFramework>(.*?)</TargetFramework>').Groups[1].Value
          $uiPlatform = [regex]::Match($uiCsproj, '<Platform>(.*?)</Platform>').Groups[1].Value
          $cliTfm = [regex]::Match((Get-Content src/AOC/AOC.csproj -Raw), '<TargetFramework>(.*?)</TargetFramework>').Groups[1].Value
          echo "UI_TFM=$uiTfm" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "UI_PLATFORM=$uiPlatform" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CLI_TFM=$cliTfm" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── Step 2: Clean stale obj files ────────────────────────────
      # Prevent MSB3713 (file locked by another process) when multiple
      # projects compete to generate AOC.Core.AssemblyInfo.cs in parallel.
      - name: Clean obj directories
        shell: pwsh
        run: Get-ChildItem -Path src -Recurse -Directory -Filter obj | Remove-Item -Recurse -Force

      # ── Step 3: Build shared core (singleton) ────────────────────
      # Build AOC.Core first — every other project depends on it.
      # Building it alone avoids CSC file-lock contention on its
      # intermediate DLL in the parallel solution build below.
      - name: Build Core project
        run: dotnet build src/AOC.Core/AOC.Core.csproj -c Release --self-contained true --disable-build-servers /p:UseSharedCompilation=false

      # ── Step 4: Build remaining projects ──────────────────────────
      # Build first so tests can run; also ensures ZeasnProxy build
      # output is available for AOC's _CopyZeasnProxyOutput target.
      - name: Build remaining projects
        run: dotnet build -c Release --self-contained true --disable-build-servers /p:UseSharedCompilation=false

      # ── Step 5: Run tests ──────────────────────────────────────────
      - name: Run Tests
        run: dotnet test tests/aoc.Tests/aoc.Tests.csproj -c Release --logger trx

      # ── Step 6: Publish projects ──────────────────────────────────
      # Publish produces the final deployment-ready output (includes
      # runtime for self-contained apps, native DLLs, etc.)
      - name: Publish UI
        run: dotnet publish src/AOC.UI/AOC.UI.csproj -c Release --self-contained true -r win-x64 --disable-build-servers /p:UseSharedCompilation=false

      - name: Publish CLI
        run: dotnet publish src/AOC/AOC.csproj -c Release --self-contained true -r win-x64 --disable-build-servers /p:UseSharedCompilation=false

      # ── Step 7: Pack UI binaries (from publish output) ───────────
      - name: Pack UI binaries
        shell: pwsh
        run: |
          # UI csproj sets <Platform>x64</Platform>, so MSBuild emits
          # output under bin/{Platform}/Release/…, not bin/Release/…
          $uiPath = "$env:UI_PROJECT/bin/$env:UI_PLATFORM/Release/$env:UI_TFM/$env:RID/publish"
          Compress-Archive -Path "$uiPath/*" -DestinationPath aoc-ui-x64.zip

      # ── Step 8: Pack CLI binaries (from publish output) ──────────
      - name: Pack CLI binaries
        shell: pwsh
        run: |
          Compress-Archive -Path "src/AOC/bin/Release/$env:CLI_TFM/win-x64/publish/*" -DestinationPath aoc-cli-x64.zip

      # ── Step 9: Create GitHub Release ─────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aoc-ui-x64.zip
            aoc-cli-x64.zip
          generate_release_notes: true
