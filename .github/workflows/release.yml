name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Name: AOCMonitor.slnx
      # Target framework for build output paths (must match AOC.UI.csproj)
      TFM: net10.0-windows10.0.26100.0
      RID: win-x64
      UI_PROJECT: src/AOC.UI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Add MSBuild to PATH: https://github.com/microsoft/setup-msbuild
      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v1

      # ── Step 1: Build all three projects in one command ───────────
      # ZeasnProxy (x86 via csproj), AOC (self-contained via csproj), AOC.UI (x64 via csproj)
      - name: Build all projects
        run: dotnet build -c Release --self-contained true --disable-build-servers

      # ── Step 2: Run tests ──────────────────────────────────────────
      - name: Run Tests
        run: dotnet test tests/aoc.Tests/aoc.Tests.csproj -c Release --logger trx

      # ── Step 3: Pack UI binaries ───────────────────────────────────
      - name: Pack UI binaries
        shell: pwsh
        run: |
          $tfm = "$env:TFM"
          $rid = "$env:RID"
          $uiPath = "$env:UI_PROJECT/bin/Release/$tfm/$rid"
          Compress-Archive -Path "$uiPath/*" -DestinationPath aoc-ui-x64.zip
      - name: Pack UI binaries
        shell: pwsh
        run: |
          $tfm = "$env:TFM"
          $rid = "$env:RID"
          $uiPath = "$env:UI_PROJECT/bin/Release/$tfm/$rid"
          Compress-Archive -Path "$uiPath/*" -DestinationPath aoc-ui-x64.zip

      # ── Step 6: Pack CLI binaries ──────────────────────────────────
      - name: Pack CLI binaries
        shell: pwsh
        run: |
          Compress-Archive -Path src/AOC/bin/Release/net10.0/* -DestinationPath aoc-cli-x64.zip

      # ── Step 7: Create GitHub Release ─────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aoc-ui-x64.zip
            aoc-cli-x64.zip
          generate_release_notes: true
